name: Deploy — Homologação

on:
  push:
    branches: [ homolog ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Validar HTML
        run: |
          echo "Verificando index.html..."
          test -f index.html && echo "OK: index.html encontrado"

  deploy-homolog:
    runs-on: ubuntu-latest
    needs: build
    environment: homologation
    steps:
      - uses: actions/checkout@v3
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMOLOG_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOMOLOG_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy na EC2-homolog
        run: |
          scp -i ~/.ssh/id_rsa index.html Dockerfile \
            ${{ secrets.HOMOLOG_USER }}@${{ secrets.HOMOLOG_HOST }}:/home/ubuntu/
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.HOMOLOG_USER }}@${{ secrets.HOMOLOG_HOST }} "
              cd /home/ubuntu
              docker build -t rotaexpress:homolog .
              docker stop rotaexpress-homolog 2>/dev/null || true
              docker rm rotaexpress-homolog 2>/dev/null || true
              docker run -d -p 80:80 --name rotaexpress-homolog rotaexpress:homolog
            "