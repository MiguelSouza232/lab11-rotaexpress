name: Deploy — Produção

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Validar HTML
        run: |
          echo "Verificando index.html..."
          test -f index.html && echo "OK: index.html encontrado"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v3
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy na EC2-prod
        run: |
          scp -i ~/.ssh/id_rsa index.html Dockerfile \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/home/ubuntu/
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "
              cd /home/ubuntu
              docker build -t rotaexpress:prod .
              docker stop rotaexpress-prod 2>/dev/null || true
              docker rm rotaexpress-prod 2>/dev/null || true
              docker run -d -p 80:80 --name rotaexpress-prod rotaexpress:prod
            "